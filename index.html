        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; box-sizing: border-box; }

        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .error { display: none; background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 6px; margin-top: 15px; font-size: 14px; font-weight: 500; }
        .result { display: none; margin-top: 25px; padding: 20px; border-radius: 10px; background: #fafafa; border: 1px solid #e5e7eb; text-align: left; }

        .row-item.subject { border-bottom: 1px dashed #e5e7eb; padding-left: 10px; }
        .row-item:last-child { border: none; }
        .lbl { font-weight: bold; color: #6b7280; }
        .val { color: var(--dark); font-weight: 500; }
        .sub-title { font-weight: bold; color: var(--primary); margin: 15px 0 5px 0; border-bottom: 1px solid #e5e7eb; padding-bottom: 3px; font-size: 13px; }
